<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generation en cours... - NicheAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#08080F;color:#E2E8F0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{text-align:center;padding:48px 32px;max-width:480px;}
.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:20px;color:#fff;margin-bottom:48px;}.logo span{color:#8B5CF6;}
.spinner{width:48px;height:48px;border:3px solid rgba(139,92,246,.2);border-top-color:#8B5CF6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 32px;}
@keyframes spin{to{transform:rotate(360deg);}}
h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;margin-bottom:12px;}
p{font-size:15px;color:#64748B;margin-bottom:8px;line-height:1.7;}
.steps{margin-top:32px;display:flex;flex-direction:column;gap:10px;}
.step{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;font-size:13px;color:#64748B;text-align:left;}
.step.active{border-color:rgba(139,92,246,.3);color:#A78BFA;}
.step-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Niche<span>AI</span></div>
  <div class="spinner"></div>
  <h1>Generation de votre rapport</h1>
  <p>L IA analyse votre profil et construit votre strategie personnalisee.</p>
  <p style="font-size:13px;color:#334155;">Environ 30 secondes...</p>
  <div class="steps">
    <div class="step active"><div class="step-dot"></div>Analyse de votre marche cible</div>
    <div class="step"><div class="step-dot"></div>Identification de votre niche optimale</div>
    <div class="step"><div class="step-dot"></div>Construction du plan d action 30 jours</div>
    <div class="step"><div class="step-dot"></div>Generation des templates et scripts</div>
  </div>
</div>
<script>
var steps = document.querySelectorAll('.step');
var i = 0;
setInterval(function(){
  steps.forEach(function(s){s.classList.remove('active');});
  i = (i+1) % steps.length;
  steps[i].classList.add('active');
}, 4000);
</script>
</body>
</html>
