<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NicheAI — Trouve ta niche freelance</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime: #C8FF00;
            --purple: #7C3AED;
            --dark: #0D0D0D;
            --card: #161616;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: white; min-height: 100vh; overflow-x: hidden; }

        .bg-glow { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 800px; height: 600px; background: radial-gradient(ellipse, rgba(124,58,237,0.25) 0%, transparent 70%); pointer-events: none; z-index: 0; }

        nav { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 24px 40px; }
        .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--lime); }
        .nav-badge { background: rgba(200,255,0,0.1); color: var(--lime); border: 1px solid rgba(200,255,0,0.3); padding: 6px 14px; border-radius: 999px; font-size: 13px; }

        .hero { position: relative; z-index: 1; text-align: center; padding: 60px 20px 40px; }
        .hero-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 16px; font-size: 13px; color: var(--muted); margin-bottom: 32px; animation: fadeUp 0.6s ease both; }
        .hero-tag::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--lime); animation: pulse 2s infinite; }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(42px, 7vw, 80px); font-weight: 800; line-height: 1.05; letter-spacing: -2px; margin-bottom: 20px; animation: fadeUp 0.6s 0.1s ease both; }
        h1 em { font-style: normal; color: var(--lime); }
        .hero-sub { font-size: 18px; color: var(--muted); max-width: 480px; margin: 0 auto 48px; line-height: 1.6; animation: fadeUp 0.6s 0.2s ease both; }

        .form-card { background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 40px; max-width: 560px; margin: 0 auto; animation: fadeUp 0.6s 0.3s ease both; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 16px; font-size: 15px; color: white; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.2s; }
        input::placeholder { color: #444; }
        input:focus, select:focus { border-color: var(--lime); }
        select option { background: #1a1a1a; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .btn { width: 100%; padding: 16px; background: var(--lime); color: var(--dark); border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; margin-top: 8px; transition: all 0.2s; letter-spacing: -0.3px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(200,255,0,0.3); }
        .btn:active { transform: translateY(0); }

        .stats { display: flex; justify-content: center; gap: 40px; margin-top: 48px; animation: fadeUp 0.6s 0.4s ease both; }
        .stat { text-align: center; }
        .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--lime); }
        .stat-label { font-size: 13px; color: var(--muted); margin-top: 2px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <nav>
        <div class="logo">Niche<span>AI</span></div>
        <div class="nav-badge">✦ Propulsé par l'IA</div>
    </nav>
    <div class="hero">
        <div class="hero-tag">Outil de positionnement freelance n°1</div>
        <h1>Trouve ta <em>niche</em><br>en 30 secondes</h1>
        <p class="hero-sub">Stop à la guerre des prix. Découvre ton positionnement unique et attire les bons clients.</p>
        <div class="form-card">
            <form action="/generer" method="POST">
                <div class="field">
                    <label>Tes compétences principales</label>
                    <input type="text" name="competences" placeholder="Ex : Python, design, rédaction..." required>
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>Ton secteur</label>
                        <input type="text" name="secteur" placeholder="Ex : e-commerce, santé..." required>
                    </div>
                    <div class="field">
                        <label>Expérience</label>
                        <select name="experience">
                            <option value="débutant (moins d'1 an)">Débutant</option>
                            <option value="intermédiaire (1 à 3 ans)">Intermédiaire</option>
                            <option value="confirmé (3 à 5 ans)">Confirmé</option>
                            <option value="expert (plus de 5 ans)">Expert</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>Client idéal</label>
                        <input type="text" name="client_type" placeholder="Ex : startups, PME..." required>
                    </div>
                    <div class="field">
                        <label>Objectif mensuel (€)</label>
                        <input type="number" name="objectif" placeholder="Ex : 2000" required>
                    </div>
                </div>
                <button type="submit" class="btn">Générer mon rapport gratuit →</button>
            </form>
        </div>
        <div class="stats">
            <div class="stat"><div class="stat-num">500+</div><div class="stat-label">Rapports générés</div></div>
            <div class="stat"><div class="stat-num">30s</div><div class="stat-label">Temps moyen</div></div>
            <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Personnalisé</div></div>
        </div>
    </div>
</body>
</html>
