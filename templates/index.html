<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouve ta niche freelance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
        .card { background: white; border-radius: 12px; padding: 40px; max-width: 560px; width: 100%; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
        p.subtitle { color: #666; margin-bottom: 30px; font-size: 15px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 6px; }
        input, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a1a; outline: none; }
        input:focus, select:focus { border-color: #6c63ff; }
        button { width: 100%; padding: 14px; background: #6c63ff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 10px; }
        button:hover { background: #5a52e0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Trouve ta niche freelance 🎯</h1>
        <p class="subtitle">Réponds à 5 questions et reçois ton positionnement personnalisé en 30 secondes.</p>
        <form action="/generer" method="POST">
            <div class="field">
                <label>Tes 3 compétences principales</label>
                <input type="text" name="competences" placeholder="Ex : Python, analyse de données, automatisation" required>
            </div>
            <div class="field">
                <label>Ton secteur de prédilection</label>
                <input type="text" name="secteur" placeholder="Ex : e-commerce, santé, finance..." required>
            </div>
            <div class="field">
                <label>Ton niveau d'expérience</label>
                <select name="experience">
                    <option value="débutant (moins d'1 an)">Débutant (moins d'1 an)</option>
                    <option value="intermédiaire (1 à 3 ans)">Intermédiaire (1 à 3 ans)</option>
                    <option value="confirmé (3 à 5 ans)">Confirmé (3 à 5 ans)</option>
                    <option value="expert (plus de 5 ans)">Expert (plus de 5 ans)</option>
                </select>
            </div>
            <div class="field">
                <label>Ton client idéal</label>
                <input type="text" name="client_type" placeholder="Ex : startups tech, PME locales..." required>
            </div>
            <div class="field">
                <label>Ton objectif mensuel (€)</label>
                <input type="number" name="objectif" placeholder="Ex : 2000" required>
            </div>
            <button type="submit">Générer mon rapport ✨</button>
        </form>
    </div>
</body>
</html>
